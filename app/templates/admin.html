<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joywood Gallery — Админ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#28251d;min-height:100vh}
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.auth-box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:340px;text-align:center}
.auth-logo{font-size:24px;font-weight:700;margin-bottom:24px}.auth-logo span{color:#01696f}
.auth-input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:12px;outline:none}.auth-input:focus{border-color:#01696f}
.auth-btn{width:100%;padding:11px;background:#01696f;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}.auth-btn:hover{background:#0c4e54}
.auth-error{color:#a12c7b;font-size:13px;margin-top:8px;min-height:18px}

.admin-header{background:#fff;border-bottom:1px solid #e8e6e1;padding:0 20px;display:flex;align-items:stretch;position:sticky;top:0;z-index:100}
.admin-logo{font-size:16px;font-weight:700;padding:14px 16px 14px 0;white-space:nowrap}.admin-logo span{color:#01696f}
.admin-tabs{display:flex;align-items:stretch;flex:1}
.tab-btn{padding:0 20px;border:none;background:none;font-size:14px;font-weight:600;color:#7a7974;cursor:pointer;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.tab-btn:hover{color:#28251d}.tab-btn.active{color:#01696f;border-bottom-color:#01696f}
.tab-count{display:inline-block;background:#f0f0ec;color:#28251d;font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;margin-left:6px}
.tab-btn.active .tab-count{background:#01696f;color:#fff}
.header-right{display:flex;align-items:center;gap:10px;padding:10px 0 10px 16px;border-left:1px solid #f0f0ec;margin-left:auto}
.btn-sync{padding:7px 14px;background:#01696f;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-sync:hover{background:#0c4e54}.btn-sync:disabled{opacity:.6;cursor:default}

.progress-bar{background:#fff;border-bottom:1px solid #e8e6e1;padding:7px 20px;font-size:13px;display:flex;gap:20px;align-items:center}
.p-ok{color:#437a22;font-weight:600}.p-skip{color:#a12c7b;font-weight:600}.p-left{color:#7a7974;font-weight:600}
.cat-panel{background:#fffdf5;border-bottom:1px solid #ede9d8;padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cat-panel-label{font-size:11px;font-weight:700;color:#7a7974;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.cat-chips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.cat-chip{display:inline-flex;align-items:center;gap:3px;background:#f0ead0;color:#28251d;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}
.cat-del{background:none;border:none;cursor:pointer;color:#7a7974;font-size:14px;padding:0 0 0 2px}.cat-del:hover{color:#a12c7b}
.cat-add-row{display:flex;gap:6px}
.cat-add-input{padding:5px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;width:140px}.cat-add-input:focus{border-color:#01696f}
.cat-add-btn{padding:5px 12px;background:#01696f;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;white-space:nowrap}.cat-add-btn:hover{background:#0c4e54}
.admin-hint{padding:6px 20px;background:#fffbe6;border-bottom:1px solid #f0ead0;font-size:12px;color:#7a7974}
.admin-hint kbd{background:#f0ead0;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:700;color:#28251d}

.queue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:20px;padding:20px;max-width:1280px;margin:0 auto}
.queue-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;transition:box-shadow .15s;border:2px solid transparent}
.queue-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.queue-card.focused{border-color:#01696f;box-shadow:0 0 0 3px rgba(1,105,111,.15)}

/* MEDIA WRAP */
.card-media-wrap{position:relative;background:#f0f0ec}
.card-cover-preview{width:100%;height:200px;background:#e8e5df;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-cover-preview img{width:100%;height:100%;object-fit:cover;display:block}
.cover-video-placeholder{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:13px;color:#7a7974;background:#e0ddd7;gap:8px}
.no-media{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:13px;color:#bab9b4}

/* MEDIA STRIP */
.card-media-strip-wrap{padding:4px 6px 2px}
.media-strip{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;scrollbar-width:thin}
.media-strip::-webkit-scrollbar{height:3px}.media-strip::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.media-cell{flex-shrink:0;width:54px;height:40px;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;position:relative;background:#e0ddd7}
.media-cell img{width:100%;height:100%;object-fit:cover;display:block}
.media-cell.selected{border-color:#01696f;box-shadow:0 0 0 1px #01696f}
.media-cell:hover{border-color:#aaa}
.play-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);pointer-events:none}
.vid-no-thumb{width:100%;height:100%;background:#2c3e50;display:flex;align-items:center;justify-content:center}
.play-badge-big{font-size:18px;color:#fff;opacity:.9}
.cover-hint{font-size:10px;color:#aaa;padding:0 2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.media-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;pointer-events:none}
.btn-play-only{display:block;width:calc(100% - 12px);margin:4px 6px;padding:6px;background:#2c3e50;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.btn-play-only:hover{background:#1a252f}

/* VIDEO OVERLAY */
.video-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.video-overlay-inner{position:relative;max-width:900px;width:100%}
.video-close{position:absolute;top:-36px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;padding:4px 10px;line-height:1}
.video-close:hover{color:#ccc}

/* CARD BODY */
.card-body{padding:12px}
.card-product-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.prod-link{font-size:12px;color:#01696f;text-decoration:none;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px;flex:1;min-width:0}
.prod-link:hover{text-decoration:underline}
.prod-name-plain{font-size:12px;color:#7a7974;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.prod-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.prod-active{background:#d4dfcc;color:#2e5c10}.prod-archived{background:#fce4b0;color:#7a4500}
.card-rating{font-size:12px;color:#d19900;margin-bottom:5px}
.card-review{font-size:12px;color:#7a7974;line-height:1.4;max-height:44px;overflow:hidden;margin-bottom:9px}
.card-field{margin-bottom:8px}
.card-field label{display:block;font-size:11px;color:#7a7974;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.card-fields-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.title-input,.cat-select,.wood-select,.url-input{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;background:#fff}
.title-input:focus,.cat-select:focus,.wood-select:focus,.url-input:focus{border-color:#01696f}
.url-input{font-size:12px}
.card-actions{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #f0f0ec}
.btn-approve{padding:11px;background:#01696f;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;border-radius:0 0 0 10px}
.btn-approve:hover{background:#0c4e54}
.btn-reject{padding:11px;background:#f5f4f0;color:#7a7974;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;border-radius:0 0 10px 0}
.btn-reject:hover{background:#e8e5df;color:#28251d}

/* PUBLISHED */
.pub-toolbar{display:flex;gap:10px;align-items:center;padding:14px 20px;background:#fff;border-bottom:1px solid #e8e6e1;flex-wrap:wrap}
.pub-search{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;width:240px}.pub-search:focus{border-color:#01696f}
.pub-filter-select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#fff;cursor:pointer}.pub-filter-select:focus{border-color:#01696f}
.pub-count{font-size:13px;color:#7a7974;margin-left:auto}
.pub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:20px;max-width:1600px;margin:0 auto}
.pub-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;transition:box-shadow .15s}
.pub-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.pub-cover{width:100%;height:170px;object-fit:cover;display:block;background:#f0f0ec}
.pub-body{padding:10px}
.pub-meta{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.pub-cat{font-size:11px;background:#e8f5e9;color:#2e5c10;padding:2px 8px;border-radius:20px;font-weight:700}
.pub-wood{font-size:11px;background:#fef3e2;color:#7a4500;padding:2px 8px;border-radius:20px;font-weight:600}
.pub-vis-ok{font-size:11px;color:#437a22;font-weight:600}.pub-vis-no{font-size:11px;color:#a17000;font-weight:600}
.pub-title-input{width:100%;padding:6px 10px;border:1px solid #e8e6e1;border-radius:6px;font-size:14px;font-weight:600;outline:none;background:#f9f8f5}
.pub-title-input:focus{border-color:#01696f;background:#fff}
.pub-fields-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pub-select,.pub-url-input{width:100%;padding:6px 10px;border:1px solid #e8e6e1;border-radius:6px;font-size:12px;outline:none;background:#f9f8f5}
.pub-select:focus,.pub-url-input:focus{border-color:#01696f;background:#fff}
.pub-actions{display:flex;gap:6px}
.btn-save{flex:1;padding:8px;background:#01696f;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-save:hover{background:#0c4e54}.btn-save.saved{background:#437a22}
.btn-unpublish{padding:8px 12px;background:#f5f4f0;color:#a12c7b;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-unpublish:hover{background:#f0e0eb}
.pub-product-link{display:block;font-size:11px;color:#01696f;text-decoration:none;margin:5px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pub-product-link:hover{text-decoration:underline}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:#7a7974}
.empty-icon{font-size:48px;margin-bottom:16px}
.tab-panel{display:none}.tab-panel.active{display:block}

/* focal picker */
.focal-wrap{width:100%;background:#1a1a1a}
.focal-hint{font-size:11px;color:#aaa;padding:4px 8px;background:#111;text-align:center}
.focal-img-wrap{position:relative;width:100%;height:280px;overflow:hidden;cursor:crosshair}
.focal-img-wrap img.focal-img{width:100%;height:100%;object-fit:contain;display:block;user-select:none}
.focal-dot{position:absolute;width:16px;height:16px;border-radius:50%;background:rgba(255,80,80,.9);border:2px solid #fff;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 2px rgba(0,0,0,.4)}
.focal-crosshair-h{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,.35);transform:translateY(-50%);pointer-events:none}
.focal-crosshair-v{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.35);transform:translateX(-50%);pointer-events:none}
.focal-coords{font-size:11px;color:#888;padding:3px 8px;background:#111;text-align:right}
.cover-video-ph{display:flex;align-items:center;justify-content:center;height:280px;background:#1a1a1a}
.card-cover-area{background:#111}

/* Stage */
.crop-stage {
  flex:1; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  background:#0d0d0d;
}
.crop-img-wrap {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  cursor:grab; user-select:none;
  overflow:hidden;
}
.crop-img-wrap img {
  max-width:none; max-height:none;
  display:block;
  pointer-events:none;
  /* base size = fill stage */
  width:100%; height:100%; object-fit:contain;
  transition:transform .05s linear;
}

/* Overlay: рамка + затемнение */
.crop-overlay { position:absolute; inset:0; pointer-events:none; }
.crop-frame {
  position:absolute;
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 0 0 9999px rgba(0,0,0,.55);
  pointer-events:none;
}
.crop-frame-corner {
  position:absolute; width:14px; height:14px;
  border-color:#fff; border-style:solid;
}
.crop-frame-corner.tl { top:-2px;left:-2px;  border-width:3px 0 0 3px; }
.crop-frame-corner.tr { top:-2px;right:-2px; border-width:3px 3px 0 0; }
.crop-frame-corner.bl { bottom:-2px;left:-2px; border-width:0 0 3px 3px; }
.crop-frame-corner.br { bottom:-2px;right:-2px; border-width:0 3px 3px 0; }
/* Линии правила третей */
.crop-rule-h, .crop-rule-v { position:absolute; background:rgba(255,255,255,.15); }
.crop-rule-h { left:0;right:0; height:1px; }
.crop-rule-h:first-of-type { top:33.3%; }
.crop-rule-h:last-of-type  { top:66.6%; }
.crop-rule-v { top:0;bottom:0; width:1px; }
.crop-rule-h { left:0;right:0;height:1px; }
/* Dim areas */
.crop-dim { position:absolute; background:rgba(0,0,0,.55); pointer-events:none; }
.crop-hint {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  font-size:12px; color:rgba(255,255,255,.4);
  pointer-events:none; white-space:nowrap;
}

/* crop button in pub-card */
.btn-crop {
  padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600;
  background:#2a3a4a; color:#7ab0d8; border:1px solid #3a5a7a;
  cursor:pointer; transition:all .15s;
}
.btn-crop:hover { background:#3a5a7a; color:#a8d4f5; }


/* ===== CROP EDITOR v2 ===== */
#cropModal{display:none;position:fixed;inset:0;z-index:9999;}
#cropModal.open{display:flex;align-items:center;justify-content:center;}
.ce-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.88);}
.ce-dialog{
  position:relative;z-index:1;
  width:min(98vw,1200px);height:min(94vh,860px);
  background:#161616;border-radius:10px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.8);
}
.ce-toolbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:8px 14px;background:#0f0f0f;border-bottom:1px solid #2a2a2a;
  flex-shrink:0;min-height:48px;
}
.ce-tabs{display:flex;gap:4px;}
.ce-tab{
  padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;
  background:#222;color:#999;border:1px solid #333;cursor:pointer;transition:all .15s;
}
.ce-tab:hover{background:#2e2e2e;color:#ddd;}
.ce-tab.active{background:#7c5c3a;color:#fff;border-color:#7c5c3a;}
.ce-sep{width:1px;height:24px;background:#2a2a2a;flex-shrink:0;}
.ce-ratios{display:flex;gap:4px;flex-wrap:wrap;}
.ce-ratio-btn{
  padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;
  background:#1e1e1e;color:#888;border:1px solid #333;cursor:pointer;transition:all .15s;
}
.ce-ratio-btn:hover{background:#2e2e2e;color:#ddd;}
.ce-ratio-btn.active{background:#5a3e28;color:#e8c98a;border-color:#7c5c3a;}
.ce-zoom-row{display:flex;align-items:center;gap:6px;}
.ce-lbl{font-size:11px;color:#666;white-space:nowrap;}
.ce-zoom-btn{
  width:24px;height:24px;border-radius:6px;font-size:16px;line-height:1;
  background:#222;color:#aaa;border:1px solid #333;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.ce-zoom-btn:hover{background:#333;color:#fff;}
#ceZoomSlider{width:120px;accent-color:#7c5c3a;cursor:pointer;}
.ce-zoom-val{font-size:11px;color:#aaa;min-width:34px;text-align:right;}
.ce-actions{display:flex;gap:6px;margin-left:auto;}
.ce-actions button{
  padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;
  cursor:pointer;border:none;transition:all .15s;
}
#ceReset{background:#222;color:#888;padding:5px 10px;font-size:16px;border-radius:6px;cursor:pointer;border:1px solid #333;}
#ceReset:hover{background:#333;color:#fff;}
#ceCancel{background:#3a1e1e;color:#e07070;}
#ceCancel:hover{background:#5a2a2a;}
#ceSave{background:#1e4a2e;color:#6be090;}
#ceSave:hover{background:#2a6a3e;}
/* Stage */
.ce-stage{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#0a0a0a;
}
.ce-media{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;user-select:none;overflow:hidden;
}
.ce-media img,.ce-media video{
  width:100%;height:100%;display:block;
  object-fit:contain;
  pointer-events:none;
  transition:transform .04s linear;
  max-width:none;max-height:none;
}
/* Mask canvas */
.ce-mask{
  position:absolute;inset:0;pointer-events:none;
  width:100%;height:100%;
}
/* Frame */
.ce-frame{
  position:absolute;
  border:2px solid rgba(255,255,255,.95);
  box-sizing:border-box;
  cursor:move;
  pointer-events:none;
}
.ce-corner{
  position:absolute;width:18px;height:18px;
  border-color:#fff;border-style:solid;
  pointer-events:all;cursor:nwse-resize;z-index:2;
}
.ce-corner.tl{top:-2px;left:-2px;  border-width:3px 0 0 3px;}
.ce-corner.tr{top:-2px;right:-2px; border-width:3px 3px 0 0;cursor:nesw-resize;}
.ce-corner.bl{bottom:-2px;left:-2px; border-width:0 0 3px 3px;cursor:nesw-resize;}
.ce-corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;}
.ce-edge{
  position:absolute;pointer-events:all;z-index:1;
  background:transparent;
}
.ce-edge.et,.ce-edge.eb{left:18px;right:18px;height:12px;cursor:ns-resize;}
.ce-edge.et{top:-6px;} .ce-edge.eb{bottom:-6px;}
.ce-edge.el,.ce-edge.er{top:18px;bottom:18px;width:12px;cursor:ew-resize;}
.ce-edge.el{left:-6px;} .ce-edge.er{right:-6px;}
/* Grid lines */
.ce-rule-h,.ce-rule-v{position:absolute;background:rgba(255,255,255,.15);pointer-events:none;}
.ce-rule-h{left:0;right:0;height:1px;}
.ce-rule-v{top:0;bottom:0;width:1px;}
/* Video bar */
.ce-video-bar{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
}
.ce-video-bar button{
  padding:4px 10px;border-radius:6px;font-size:12px;
  background:#222;color:#ccc;border:1px solid #333;cursor:pointer;
}
.ce-video-bar button:hover{background:#333;color:#fff;}
#ceVidCapture{background:#1e3a4a;color:#7ab8d8;border-color:#2a5a7a;}
#ceVidCapture:hover{background:#2a5a7a;color:#a8d8f8;}
.ce-hint{
  position:absolute;bottom:44px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,.35);
  pointer-events:none;white-space:nowrap;background:rgba(0,0,0,.4);
  padding:3px 10px;border-radius:10px;
}
/* btn-crop */
.btn-crop{
  padding:5px 11px;border-radius:6px;font-size:12px;font-weight:600;
  background:#1e2e3e;color:#7aaacc;border:1px solid #2a4a6a;
  cursor:pointer;transition:all .15s;
}
.btn-crop:hover{background:#2a4a6a;color:#a8ccee;}


.pub-cover-wrap{width:100%;aspect-ratio:4/5;overflow:hidden;background:#f0ede7;border-radius:8px 8px 0 0;position:relative;}
.pub-cover-img{width:100%;height:100%;object-fit:cover;display:block;}
.pub-cover-empty{width:100%;height:100%;background:#f0ede7;}
.pub-video-badge{position:absolute;bottom:7px;right:7px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:10px;pointer-events:none;}

/* ===== PHOTO STRIP ===== */
.ph-strip{

}
.ph-thumb{

}
.ph-thumb:hover{border-color:#7c5c3a;}
.ph-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s;}

.ph-hidden{border-color:#a33!important;}
.ph-eye{

/* ===== AUTOPLAY ROW ===== */
.ap-row{

}
.ap-lbl{

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1612;--surface:#231e19;--surface2:#2c2620;--border:#3a3028;
  --gold:#c8a84b;--gold-light:#e2c978;--gold-muted:#8a6f2e;
  --text:#f0e8d8;--text-muted:#9a8870;--green:#4caf77;--yellow:#d4a843;--gray:#555;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:2.5rem;width:320px;text-align:center}
.auth-logo{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem}
.auth-logo span{color:var(--gold)}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:.7rem 1rem;border-radius:8px;font-size:1rem;margin-bottom:.8rem;outline:none}
.auth-input:focus{border-color:var(--gold-muted)}
.auth-btn{width:100%;background:var(--gold);color:#1a1612;border:none;padding:.7rem;
  border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer;transition:background .2s}
.auth-btn:hover{background:var(--gold-light)}
.auth-error{color:#e57373;font-size:.85rem;margin-top:.5rem;min-height:1.2em}

.admin-header{display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface)}
.admin-logo{font-size:1.3rem;font-weight:700}
.admin-logo span{color:var(--gold)}.admin-logo em{color:var(--text-muted);font-style:normal;font-weight:400;font-size:1rem;margin-left:.4rem}
.admin-stats{display:flex;align-items:center;gap:.8rem}
.stat-badge{background:var(--gold-muted);color:var(--text);padding:.3rem .8rem;border-radius:99px;font-size:.85rem}
.btn-sync{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);
  padding:.3rem .9rem;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s}
.btn-sync:hover{border-color:var(--gold-muted);color:var(--text)}

.admin-hint{text-align:center;padding:.5rem;color:var(--text-muted);font-size:.82rem}
.admin-hint kbd{background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;padding:.1rem .4rem;font-size:.8rem;color:var(--gold)}

.queue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.2rem;padding:1.5rem}

.queue-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.queue-card.focused{border-color:var(--gold-muted)}
.card-photos{display:flex;gap:.4rem;padding:.6rem;background:var(--surface2);overflow-x:auto}
.card-photos img{width:70px;height:70px;object-fit:cover;border-radius:6px;flex-shrink:0}
.card-body{padding:.9rem 1rem}
.card-product{color:var(--gold-light);font-size:.8rem;margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-rating{color:var(--gold);font-size:.9rem;margin-bottom:.4rem}
.card-review{color:var(--text-muted);font-size:.83rem;line-height:1.5;max-height:4.5em;overflow:hidden;margin-bottom:.8rem}

.card-field label{font-size:.75rem;color:var(--text-muted);display:block;margin-bottom:.2rem}
.card-field input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:.45rem .7rem;border-radius:6px;font-size:.85rem;outline:none}
.card-field input:focus{border-color:var(--gold-muted)}

.card-tags-wrap{margin-top:.6rem;display:flex;flex-wrap:wrap;gap:.35rem}
.tag-toggle{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);
  padding:.2rem .6rem;border-radius:99px;cursor:pointer;font-size:.78rem;transition:all .2s}
.tag-toggle.on{background:var(--gold-muted);border-color:var(--gold-muted);color:var(--text)}

.score-badge{display:inline-block;padding:.2rem .65rem;border-radius:99px;font-size:.78rem;font-weight:600;margin-top:.6rem}
.score-green{background:rgba(76,175,119,.2);color:#4caf77;border:1px solid #4caf77}
.score-yellow{background:rgba(212,168,67,.2);color:#d4a843;border:1px solid #d4a843}
.score-gray{background:rgba(85,85,85,.2);color:#888;border:1px solid #555}

.card-actions{display:flex;gap:.6rem;padding:.8rem 1rem;border-top:1px solid var(--border)}
.btn-approve{flex:1;background:rgba(76,175,119,.15);border:1px solid #4caf77;color:#4caf77;
  padding:.5rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s}
.btn-approve:hover{background:rgba(76,175,119,.3)}
.btn-reject{flex:1;background:rgba(229,115,115,.1);border:1px solid #e57373;color:#e57373;
  padding:.5rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s}
.btn-reject:hover{background:rgba(229,115,115,.2)}

.empty-queue{text-align:center;padding:5rem;color:var(--text-muted)}
.empty-queue .empty-icon{font-size:3rem;margin-bottom:1rem}

@media(max-width:600px){.queue-grid{grid-template-columns:1fr;padding:1rem}}

/* ===== FOCAL POINT PICKER ===== */
.focal-wrap {
  margin-bottom: 6px;
}
.focal-hint {
  font-size: 11px;
  color: #888;
  margin-bottom: 4px;
  font-style: italic;
}
.focal-img-wrap {
  position: relative;
  display: inline-block;
  width: 100%;
  cursor: crosshair;
  border-radius: 8px;
  overflow: hidden;
  user-select: none;
  background: #111;
}
.focal-img {
  width: 100%;
  height: auto;
  display: block;
  max-height: 280px;
  object-fit: contain;
  pointer-events: none;
}
.focal-dot {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(255,220,100,.9);
  border: 2.5px solid #fff;
  box-shadow: 0 0 0 1.5px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.4);
  transform: translate(-50%, -50%);
  pointer-events: all;
  cursor: grab;
  z-index: 5;
  transition: transform .12s;
}
.focal-dot:hover { transform: translate(-50%,-50%) scale(1.25); }
.focal-crosshair-h {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: rgba(255,220,100,.5);
  transform: translateY(-50%);
  pointer-events: none;
  z-index: 4;
}
.focal-crosshair-v {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(255,220,100,.5);
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 4;
}
.focal-coords {
  font-size: 11px;
  color: #999;
  margin-top: 3px;
  text-align: right;
}

/* pub-focal */
.pub-focal .focal-img { max-height: 200px; }
.pub-focal { margin-bottom: 8px; }

/* media strip */
.media-strip {
  display: flex;
  gap: 4px;
  padding: 4px 0;
  overflow-x: auto;
  scrollbar-width: thin;
}
.media-cell {
  flex-shrink: 0;
  width: 56px;
  height: 44px;
  border-radius: 5px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  background: #222;
  transition: border-color .15s;
}
.media-cell img { width:100%;height:100%;object-fit:cover; }
.media-cell.selected { border-color: #ffd93d; }
.media-cell:hover { border-color: rgba(255,217,61,.6); }
.vid-no-thumb {
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:#1a2a3a;
}
.play-badge-big { font-size:18px; color:#fff; opacity:.8; }
.cover-hint {
  font-size:11px;color:#888;
  margin-top:2px;
  font-style:italic;
}
.cover-video-ph {
  display:flex;align-items:center;justify-content:center;
  background:#1a2a3a;
  border-radius:8px;
  padding:20px;
}
.btn-play-vid,.btn-play-only {
  background:#2c4a6e;color:#fff;
  border:none;border-radius:6px;
  padding:8px 16px;cursor:pointer;font-size:14px;
  transition:background .15s;
}
.btn-play-vid:hover,.btn-play-only:hover { background:#3a6090; }

/* video overlay */
.video-overlay {
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.video-overlay-inner { position:relative;max-width:900px;width:100%; }
.video-close {
  position:absolute;top:-36px;right:0;
  background:rgba(255,255,255,.2);border:none;color:#fff;

}

/* progress stats */
.p-ok{color:#4caf80;margin-right:12px}
.p-skip{color:#e07070;margin-right:12px}
.p-left{color:#a0a0a0}

/* ===== CROP EDITOR ===== */
#cropModal { display:none; position:fixed; inset:0; z-index:9999; }
#cropModal.open { display:flex; align-items:center; justify-content:center; }
.crop-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.85); }
.crop-dialog {
  position:relative; z-index:1;
  width:min(96vw,1100px); height:min(92vh,820px);
  background:#1a1a1a; border-radius:12px; overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
}
.crop-toolbar {
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  padding:10px 16px; background:#111; border-bottom:1px solid #333;
  flex-shrink:0;
}
.crop-ratios { display:flex; gap:6px; flex-wrap:wrap; }
.crop-ratio-btn {
  padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600;
  background:#2a2a2a; color:#bbb; border:1px solid #444; cursor:pointer;
  transition:all .15s;
}
.crop-ratio-btn:hover { background:#3a3a3a; color:#fff; }
.crop-ratio-btn.active { background:#7c5c3a; color:#fff; border-color:#7c5c3a; }
.crop-zoom-wrap { display:flex; align-items:center; gap:8px; margin-left:auto; }
.crop-zoom-label { font-size:12px; color:#888; white-space:nowrap; }
#cropZoomSlider { width:140px; accent-color:#7c5c3a; cursor:pointer; }
#cropZoomVal { font-size:12px; color:#ccc; min-width:36px; text-align:right; }
.crop-actions { display:flex; gap:8px; }
.crop-actions button {
  padding:6px 14px; border-radius:6px; font-size:13px; font-weight:600;
  cursor:pointer; border:none; transition:all .15s;
}
#cropReset  { background:#2a2a2a; color:#aaa; }
#cropReset:hover { background:#3a3a3a; color:#fff; }
#cropCancel { background:#3a2020; color:#e08080; }
#cropCancel:hover { background:#5a2a2a; }
#cropSave   { background:#2a5c3a; color:#7edd9f; }
#cropSave:hover { background:#2a7c4a; color:#a0ffb8; }

/* Stage */
.crop-stage {
  flex:1; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  background:#0d0d0d;
}
.crop-img-wrap {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  cursor:grab; user-select:none;
  overflow:hidden;
}
.crop-img-wrap img {
  max-width:none; max-height:none;
  display:block;
  pointer-events:none;
  /* base size = fill stage */
  width:100%; height:100%; object-fit:contain;
  transition:transform .05s linear;
}

/* Overlay: рамка + затемнение */
.crop-overlay { position:absolute; inset:0; pointer-events:none; }
.crop-frame {
  position:absolute;
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 0 0 9999px rgba(0,0,0,.55);
  pointer-events:none;
}
.crop-frame-corner {
  position:absolute; width:14px; height:14px;
  border-color:#fff; border-style:solid;
}
.crop-frame-corner.tl { top:-2px;left:-2px;  border-width:3px 0 0 3px; }
.crop-frame-corner.tr { top:-2px;right:-2px; border-width:3px 3px 0 0; }
.crop-frame-corner.bl { bottom:-2px;left:-2px; border-width:0 0 3px 3px; }
.crop-frame-corner.br { bottom:-2px;right:-2px; border-width:0 3px 3px 0; }
/* Линии правила третей */
.crop-rule-h, .crop-rule-v { position:absolute; background:rgba(255,255,255,.15); }
.crop-rule-h { left:0;right:0; height:1px; }
.crop-rule-h:first-of-type { top:33.3%; }
.crop-rule-h:last-of-type  { top:66.6%; }
.crop-rule-v { top:0;bottom:0; width:1px; }
.crop-rule-h { left:0;right:0;height:1px; }
/* Dim areas */
.crop-dim { position:absolute; background:rgba(0,0,0,.55); pointer-events:none; }
.crop-hint {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  font-size:12px; color:rgba(255,255,255,.4);
  pointer-events:none; white-space:nowrap;
}

/* crop button in pub-card */
.btn-crop {
  padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600;
  background:#2a3a4a; color:#7ab0d8; border:1px solid #3a5a7a;
  cursor:pointer; transition:all .15s;
}
.btn-crop:hover { background:#3a5a7a; color:#a8d4f5; }
.btn-ai-focal {
  padding: 8px 10px;
  background: #f0f7f0;
  color: #2a6a3a;
  border: 1px solid #b0d8b0;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn-ai-focal:hover { background: #d8f0d8; border-color: #2a6a3a; }
.btn-ai-focal:disabled { opacity: .6; cursor: wait; }
.btn-undo-ai {
  padding: 8px 10px;
  background: #fff8e8;
  color: #7a5a1a;
  border: 1px solid #e0c87a;
  border-radius: 7px;
  font-size: 14px;
  cursor: pointer;
  transition: all .15s;
}
.btn-undo-ai:hover { background: #ffeebb; }

/* ===== PUB GRID ===== */
#pubGrid {
  position: relative;
  width: 100%;
  min-height: 200px;
}
.pub-grid-card {
  position: absolute;
  box-sizing: border-box;
}
.pgc-img-wrap {
  position: relative;

  overflow: hidden;
  background: #f0ede7;
}
.pgc-cover {

}
.pgc-video-badge {

.pgc-del { color: #c0392b; }
.pgc-title {

/* ===== DRAWER (modal) ===== */

#pubDrawer {

  border-radius: 14px;
  border: 1px solid #e0d8cc;
  box-shadow: 0 24px 64px rgba(0,0,0,.28);

.dr-header {

.dr-close {

.dr-close:hover { color: #333; }

  flex-direction: column;
  border-right: 1px solid #e8e0d8;

}

.dr-preview-wrap {

  border-radius: 8px;
  overflow: hidden;
  background: #111;
  flex-shrink: 0;

}
.dr-preview-wrap img {

}

/* strip thumbnails */

  display: flex; gap: 6px; flex-wrap: nowrap;
  overflow-x: auto; padding: 2px 0;
}
.dph-thumb {
  position: relative; flex-shrink: 0;
  width: 56px; height: 56px;
  border-radius: 5px; overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .15s;

.dph-thumb.dph-active { border-color: #c8a882; }
.dph-thumb.dph-hidden { opacity: .35; }
.dph-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.dph-eye, .dph-star {
  position: absolute;
  font-size: 11px;
  background: rgba(0,0,0,.5);

  padding: 1px 2px;

}
.dph-eye  { bottom: 2px; left: 2px; }
.dph-star { bottom: 2px; right: 2px; }
.dph-score {

/* fields */
.dr-fields { display: flex; flex-direction: column; gap: 6px; }
.dr-label { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: -2px; }
.dr-input, .dr-select {
  width: 100%; padding: 7px 10px;
  border: 1px solid #d8cfc4; border-radius: 6px;
  font-size: 13px; background: #fff;
  box-sizing: border-box;
}
.dr-input:focus, .dr-select:focus { outline: none; border-color: #c8a882; }
.dr-radio-row { display: flex; gap: 14px; font-size: 13px; }
.dr-radio-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; }

/* actions */
.dr-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 10px 0 4px;
  border-top: 1px solid #e8e0d8;
  margin-top: 4px;
}
.dr-btn {
  padding: 8px 12px; border-radius: 7px;
  border: 1px solid #d8cfc4; background: #fff;
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .12s;
}
.dr-btn:hover { background: #f5f0ea; }
.dr-save { background: #f0f7f0; color: #2a6a3a; border-color: #b0d8b0; }
.dr-save:hover { background: #d8f0d8; }
.dr-ai   { background: #f0f7f0; color: #2a6a3a; border-color: #b0d8b0; }
.dr-undo { background: #fff8e8; color: #7a5a1a; border-color: #e0c87a; }
.dr-btn:disabled { opacity: .5; cursor: wait; }


.dr-size-manual-label {
  display:flex; align-items:center; gap:6px;
  font-size:11px; color:#888; cursor:pointer;
  margin-top:3px;
}
.dr-size-manual-label input[type=checkbox] { cursor:pointer; }
</style>
</head>
<body>
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Joy<span>wood</span> Admin</div>
    <input type="password" id="tokenInput" class="auth-input" placeholder="Admin Token" autofocus>
    <button class="auth-btn" id="authBtn">Войти</button>
    <p class="auth-error" id="authError"></p>
  </div>
</div>
<div id="adminApp" style="display:none">
  <header class="admin-header">
    <div class="admin-logo">Joy<span>wood</span></div>
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="queue">Очередь <span class="tab-count" id="queueTabCount">0</span></button>
      <button class="tab-btn" data-tab="published">Опубликовано <span class="tab-count" id="pubTabCount">0</span></button>
    </div>
    <div class="header-right">
      <button class="btn-sync" id="btnSync">↻ Синхронизировать</button>
    </div>
  </header>
  <div class="tab-panel active" id="tab-queue">
    <div class="progress-bar" id="progressStats">
      <span class="p-ok">✓ одобрено: 0</span>
      <span class="p-skip">✗ пропущено: 0</span>
      <span class="p-left">⏳ осталось: 0</span>
    </div>
    <div class="cat-panel">
      <span class="cat-panel-label">Категории:</span>
      <div class="cat-chips" id="catManager"></div>
      <div class="cat-add-row">
        <input type="text" id="catAddInput" class="cat-add-input" placeholder="Новая...">
        <button id="catAddBtn" class="cat-add-btn">+ Добавить</button>
      </div>
    </div>
    <div class="admin-hint">
      <kbd>→</kbd><kbd>Enter</kbd> — опубликовать &nbsp;|&nbsp; <kbd>←</kbd><kbd>Delete</kbd> — пропустить &nbsp;|&nbsp; <kbd>↑</kbd><kbd>↓</kbd> — навигация
    </div>
    <div class="queue-grid" id="queueGrid"></div>
    <div class="empty-state" id="emptyQueue" style="display:none"><div class="empty-icon">✅</div><p>Очередь пуста</p></div>
  </div>
  <div class="tab-panel" id="tab-published">
    <div class="pub-toolbar">
      <input type="search" id="pubSearch" class="pub-search" placeholder="Поиск по названию...">
      <select id="pubCatFilter" class="pub-filter-select"><option value="">Все категории</option></select>
      <select id="pubWoodFilter" class="pub-filter-select"><option value="">Все породы</option></select>
      <span class="pub-count" id="pubCount"></span>
    </div>
    <div class="pub-grid" id="pubGrid"></div>
    <div class="empty-state" id="emptyPub" style="display:none"><div class="empty-icon">🗂</div><p>Нет опубликованных работ</p></div>
  </div>
</div>
<script src="/static/crop-editor.js?v=1776771482"></script>
<script src="/static/focal.js?v=1776401321"></script>
<script src="/static/admin.js?v=1776772338"></script>

<!-- DRAWER -->
<div id="pubDrawerOverlay" onclick="closeDrawer()"></div>
<div id="pubDrawer">
  <div id="drawerLeft">
    <div id="drPreviewPane" style="flex:1;overflow:hidden;"></div>
  </div>
  <div style="display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden;">
    <div class="dr-header">
      <span id="drHeaderTitle">&#9998; Редактирование</span>
      <button class="dr-close" onclick="closeDrawer()">&#215;</button>
    </div>
    <div id="drawerBody"></div>
  </div>
</div>


</body>
</html>
